<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }

            background: linear-gradient(rgba(0, 69, 13, 0.75), rgba(17, 29, 35, 0.9));
        }

        .login-card {
            backdrop-filter: blur(8px);
            background-color: rgba(255, 255, 255, 0.98);
        }

        .btn-interact:active {
            transform: scale(0.98);
        }

        /* Hide Scrollbar for clean UI */
        body::-webkit-scrollbar {
            display: none;
        }
        body {

            scrollbar-width: none;
        }

<body class="bg-background text-on-background font-body-md min-h-screen flex items-center justify-center p-margin-mobile md:p-0">
<!-- Background Image Layer -->
<div class="fixed inset-0 z-0 overflow-hidden">
<div class="w-full h-full bg-cover bg-center transition-transform duration-10000 hover:scale-110" data-alt="A cinematic, low-angle shot of a pristine professional soccer pitch at dusk. The vibrant green synthetic turf is perfectly textured with morning dew glistening under stadium floodlights. In the background, blurred stadium seats create a sense of scale and professional athletic intensity. The overall mood is powerful, focused, and ready for high-performance action, dominated by deep athletic greens and dark atmospheric shadows." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAlg8X_A04_9jTsvMQ1L3vOJ5ggfWWit5n73RaOXTpWI0sZaPHUHsowqpylkzosbbxsJUZdeHvTltFRRxv-T4BmW7qxd68grs7JSGN5QbrrxTP42MosfJlJgdGpBKV_Sp3d41u-GBC6IaquaF_owYcAc_2hwT-G-ASbEPJojemPjMX7SqaWLHWLgi3_jnRWVTlABEU_pirUXp9-hY32DR1eEYmd1dDWCSz8qDJ1KH0q05lqKKxfNvlACw')"></div>
<div class="absolute inset-0 turf-overlay"></div>
</div>
<!-- Main Content Container -->
<main class="relative z-10 w-full max-w-[480px] px-margin-mobile py-xl flex flex-col items-center">
<!-- Brand Header -->
<div class="mb-md text-center">
<h1 class="font-headline-xl text-headline-xl text-primary-fixed tracking-tight mb-xs">TurfConnect</h1>
<p class="font-headline-md text-headline-md text-surface-container-lowest opacity-90">
                Welcome Back, Athlete
            </p>
</div>
<!-- Login Card -->
<div class="login-card w-full rounded-xl shadow-xl p-md md:p-lg border border-surface-container-high" style="opacity: 1; transform: translateY(0px); transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1);">
<form class="space-y-md" id="loginForm" onsubmit="return false;">
<!-- Email Input -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant block" for="email">
                        Email Address
                    </label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary transition-colors">
                            mail
                        </span>
<input class="w-full pl-xl pr-md py-sm bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-on-surface focus:ring-2 focus:ring-secondary focus:border-secondary transition-all outline-none" id="email" name="email" placeholder="name@example.com" required="" type="email">
</div>
</div>
<!-- Password Input -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant block" for="password">
                            Password
                        </label>
<a class="font-label-sm text-label-sm text-secondary hover:text-primary-container transition-colors" href="#">
                            Forgot Password?
                        </a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary transition-colors">
                            lock
                        </span>
<input class="w-full pl-xl pr-md py-sm bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-on-surface focus:ring-2 focus:ring-secondary focus:border-secondary transition-all outline-none" id="password" name="password" placeholder="••••••••" required="" type="password">
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="eyeIcon">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center space-x-sm">
<input class="w-5 h-5 rounded border-outline-variant text-secondary focus:ring-secondary cursor-pointer" id="remember" name="remember" type="checkbox">
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer select-none" for="remember">
                        Remember Me
                    </label>
</div>
<!-- Sign In Button -->
<button class="btn-interact w-full py-md bg-secondary text-on-secondary font-label-md text-label-md rounded-full shadow-md hover:bg-on-secondary-fixed-variant transition-all flex justify-center items-center gap-xs" type="submit">
<span class="">Sign In</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Divider -->
<div class="relative my-md">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-label-sm">
<span class="bg-surface-container-lowest px-sm text-outline">Or continue with</span>
</div>
</div>
<!-- Social Sign In -->
<button class="btn-interact w-full py-sm border border-outline-variant rounded-full font-label-md text-label-md text-on-surface-variant hover:bg-surface-container transition-colors flex justify-center items-center gap-sm" type="button">
<svg class="w-5 h-5" viewBox="0 0 24 24">

<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
<span class="">Sign in with Google</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-lg text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-secondary font-bold hover:underline transition-all" href="#">Sign Up</a>
</p>
</div>
</div>
<!-- Subtle Footer Info -->
<footer class="mt-md text-center">
<p class="font-label-sm text-label-sm text-surface-container-lowest opacity-60">© 2024 TurfConnect Pro Field Management. All rights reserved.</p>
</footer>
</main>
<script>
        // Micro-interaction: Password visibility toggle
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = 'visibility';
            }
        }

        // micro-interaction: Subtle hover effect on card
        const card = document.querySelector('.login-card');
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth > 768) {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            }
        });

        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        // Entrance animation
        window.addEventListener('DOMContentLoaded', () => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            setTimeout(() => {
                card.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0px)';
            }, 100);
        });
    </script>


</body></html>
