server:
  port: 8083

spring:
  application:
    name: booking-service
  profiles:
    active: dev
  config:
    import: "optional:file:../../config/application-${spring.profiles.active}.yml"
  data:
    mongodb:
      # Specific database override for Booking service
      uri: ${BOOKING_MONGO_URI:mongodb://localhost:27017/bookingdb}

# Disable Redis health check — Redis uses WSL networking which causes
# ClosedChannelException from Java/Netty. The service degrades gracefully
# (fail-open lock) so we don't want it to report DOWN and cause 503s.
management:
  health:
    redis:
      enabled: false
