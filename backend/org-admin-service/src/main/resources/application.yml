server:
  port: 8087

spring:
  application:
    name: org-admin-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/turfconnect_orgadmin

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info
