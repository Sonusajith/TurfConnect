server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://127.0.0.1:5173"
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # Auth Service Health Routing
        - id: auth-service-health
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/actuator/health
          filters:
            - SetPath=/actuator/health
        # Auth Service Business Routing
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**

        # Turf Service Health Routing
        - id: turf-service-health
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/turfs/actuator/health
          filters:
            - SetPath=/actuator/health
        # Turf Service Business Routing
        - id: turf-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/turfs/**

        # Booking Service Health Routing
        - id: booking-service-health
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/bookings/actuator/health
          filters:
            - SetPath=/actuator/health
        # Booking Service Business Routing
        - id: booking-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/bookings/**
        - id: recommendation-service
          uri: lb://recommendation-service
          predicates:
            - Path=/api/v1/recommendations/**
        - id: fraud-signal-service
          uri: lb://fraud-signal-service
          predicates:
            - Path=/api/v1/fraud/**
        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/v1/analytics/**
        - id: org-admin-service
          uri: lb://org-admin-service
          predicates:
            - Path=/api/v1/orgs/**

        # Payment Service Health Routing
        - id: payment-service-health
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/payments/actuator/health
          filters:
            - SetPath=/actuator/health
        # Payment Service Business Routing
        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/payments/**

        # Review Service Health Routing
        - id: review-service-health
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/reviews/actuator/health
          filters:
            - SetPath=/actuator/health
        # Review Service Business Routing
        - id: review-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/reviews/**

        # Community Service Health Routing
        - id: community-service-health
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/teams/actuator/health,/api/v1/invitations/actuator/health
          filters:
            - SetPath=/actuator/health
        # Community Service Business Routing
        - id: community-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/teams/**,/api/v1/invitations/**,/api/v1/matches/**

        - id: tournament-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/tournaments/**,/api/v1/leaderboards/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

jwt:
  secret: ${JWT_SECRET:4f7831f13b6329c323f66a877995dc8ab8e92f70b8c6e2646a5b6727282b535d}
