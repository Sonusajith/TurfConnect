server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: turf-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/turfs/**
        - id: booking-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/bookings/**
        - id: community-service
          uri: lb://community-service
          predicates:
            - Path=/api/v1/teams/**,/api/v1/invitations/**
        - id: recommendation-service
          uri: lb://recommendation-service
          predicates:
            - Path=/api/v1/recommendations/**
        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/payments/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

jwt:
  secret: ${JWT_SECRET:4f7831f13b6329c323f66a877995dc8ab8e92f70b8c6e2646a5b6727282b535d}
